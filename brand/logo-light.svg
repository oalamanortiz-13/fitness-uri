<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 100" width="460" height="100">
  <!--
    Tu Preparador · Horizontal logo — light/white backgrounds (docs, PDF)
  -->
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;700&amp;display=swap');
    </style>
  </defs>

  <!-- Arrow mark on dark pill so lime stays visible on white bg -->
  <rect x="8" y="4" width="100" height="92" rx="16" fill="#0D0D0D"/>
  <g transform="translate(16,6) scale(0.46)">
    <polygon
      points="100,22 160,98 126,98 126,178 74,178 74,98 40,98"
      fill="#C6FF34"/>
    <rect x="74" y="178" width="52" height="8" rx="4" fill="#0038A8"/>
  </g>

  <!-- Thin divider -->
  <line x1="120" y1="16" x2="120" y2="84" stroke="#0D0D0D" stroke-width="1" opacity="0.12"/>

  <!-- TU -->
  <text
    x="136" y="42"
    font-family="'Outfit', 'Helvetica Neue', Arial, sans-serif"
    font-size="13" font-weight="300" letter-spacing="8"
    fill="#0D0D0D" opacity="0.45">TU</text>

  <!-- PREPARADOR -->
  <text
    x="134" y="80"
    font-family="'Outfit', 'Helvetica Neue', Arial, sans-serif"
    font-size="35" font-weight="700" letter-spacing="1"
    fill="#0D0D0D">PREPARADOR</text>
</svg>
