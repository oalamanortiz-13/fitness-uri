<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 110" width="560" height="110">
  <!--
    Tu Preparador · Horizontal — light/white backgrounds (PDF, docs)
    Mark always on navy pill so cyan stays vivid
  -->
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&amp;display=swap');</style>
    <linearGradient id="bg-l" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#071a8a"/>
      <stop offset="100%" stop-color="#03045E"/>
    </linearGradient>
    <linearGradient id="sk-l" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00D4FF" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#00D4FF" stop-opacity="0"/>
    </linearGradient>
    <filter id="ag-l">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="mark-clip-l">
      <rect x="0" y="0" width="110" height="110" rx="20"/>
    </clipPath>
  </defs>

  <!-- Mark pill (always dark so colors stay vivid) -->
  <rect x="0" y="0" width="110" height="110" rx="20" fill="url(#bg-l)"/>

  <g clip-path="url(#mark-clip-l)">
    <line x1="-10" y1="110" x2="120" y2="0"
      stroke="url(#sk-l)" stroke-width="18" opacity="0.35"/>
  </g>

  <g transform="translate(4,5) scale(0.505)">
    <polygon points="22,18 118,18 112,40 16,40" fill="white"/>
    <polygon points="58,40 80,40 72,180 50,180" fill="white"/>
    <polygon points="96,18 118,18 110,180 88,180" fill="white"/>
    <path d="M 114,18 C 192,18 192,98 114,98 L 110,86 C 172,86 172,30 110,30 Z" fill="white"/>
    <g filter="url(#ag-l)">
      <line x1="118" y1="88" x2="176" y2="32"
        stroke="#00D4FF" stroke-width="8" stroke-linecap="round"/>
      <polygon points="176,32 157,41 165,59" fill="#00D4FF"/>
    </g>
  </g>

  <!-- Text on light bg: navy colors -->
  <text x="128" y="38"
    font-family="'Outfit','Helvetica Neue',Arial,sans-serif"
    font-size="13" font-weight="700" letter-spacing="7"
    fill="#03045E" opacity="0.8">TU</text>

  <text x="126" y="74"
    font-family="'Outfit','Helvetica Neue',Arial,sans-serif"
    font-size="36" font-weight="900" letter-spacing="0.5"
    fill="#03045E">PREPARADOR</text>

  <text x="128" y="96"
    font-family="'Outfit','Helvetica Neue',Arial,sans-serif"
    font-size="10" font-weight="300" letter-spacing="2.5"
    fill="#6b7898">CONECTA · ENTRENA · EVOLUCIONA</text>
</svg>
