<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" width="1000" height="1000">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;700&amp;display=swap');</style>
  </defs>

  <!-- Background -->
  <rect width="1000" height="1000" fill="#0038A8"/>

  <!-- Subtle texture: faint lime circle in background -->
  <circle cx="500" cy="380" r="360" fill="#C6FF34" opacity="0.04"/>

  <!-- Peak mark — white chevron + lime triangle, scaled 2x centered -->
  <g transform="translate(300,120) scale(2.0)">
    <polyline points="40,162 100,40 160,162"
      fill="none" stroke="#FFFFFF" stroke-width="20"
      stroke-linecap="round" stroke-linejoin="round"/>
    <polygon points="100,76 73,134 127,134" fill="#C6FF34"/>
  </g>

  <!-- Wordmark -->
  <text x="500" y="640"
    font-family="'Outfit', 'Helvetica Neue', Arial, sans-serif"
    font-size="56" font-weight="300" letter-spacing="24"
    fill="#FFFFFF" opacity="0.8"
    text-anchor="middle">TU</text>
  <text x="500" y="770"
    font-family="'Outfit', 'Helvetica Neue', Arial, sans-serif"
    font-size="108" font-weight="700" letter-spacing="4"
    fill="#FFFFFF"
    text-anchor="middle">PREPARADOR</text>

  <!-- Tagline -->
  <text x="500" y="840"
    font-family="'Outfit', 'Helvetica Neue', Arial, sans-serif"
    font-size="28" font-weight="300" letter-spacing="3"
    fill="#C6FF34" opacity="0.7"
    text-anchor="middle">tupreparador.es</text>
</svg>
