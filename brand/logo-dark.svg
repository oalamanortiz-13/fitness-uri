<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120" width="520" height="120">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@800;900&amp;display=swap');</style>
  </defs>

  <!-- TP monogram mark, left side -->
  <!-- T crossbar -->
  <rect x="12" y="22" width="46" height="12" rx="3" fill="#C6FF34"/>
  <!-- T stem -->
  <rect x="29" y="22" width="12" height="76" rx="3" fill="#C6FF34"/>
  <!-- P stem -->
  <rect x="64" y="22" width="12" height="76" rx="3" fill="#C6FF34"/>
  <!-- P bowl -->
  <path d="M76,22 Q114,22 114,52 Q114,82 76,82 L76,70 Q100,70 100,52 Q100,34 76,34 Z" fill="#C6FF34"/>

  <!-- Blue accent line -->
