<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" width="480" height="120">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;700&amp;display=swap');</style>
  </defs>

  <!-- Peak mark — white chevron + lime triangle, scaled 0.45x into 120px tall canvas -->
  <g transform="translate(16,15) scale(0.45)">
    <polyline points="40,162 100,40 160,162"
      fill="none" stroke="#FFFFFF" stroke-width="20"
      stroke-linecap="round" stroke-linejoin="round"/>
    <polygon points="100,76 73,134 127,134" fill="#C6FF34"/>
  </g>

  <!-- Thin divider -->
  <line x1="124" y1="22" x2="124" y2="98" stroke="#FFFFFF" stroke-width="1" opacity="0.15"/>

  <!-- Wordmark -->
  <text x="140" y="50"
    font-family="'Outfit', 'Helvetica Neue', Arial, sans-serif"
    font-size="16" font-weight="300" letter-spacing="7"
    fill="#FFFFFF" opacity="0.75">TU</text>
  <text x="138" y="87"
    font-family="'Outfit', 'Helvetica Neue', Arial, sans-serif"
    font-size="36" font-weight="700" letter-spacing="0.5"
    fill="#FFFFFF">PREPARADOR</text>
</svg>
