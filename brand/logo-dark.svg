<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 100" width="460" height="100">
  <!--
    Tu Preparador · Horizontal logo — dark backgrounds
    Outfit font loaded from parent HTML for inline use.
    For <img> usage, system fallback: Helvetica Neue / Arial
  -->
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;700&amp;display=swap');
    </style>
  </defs>

  <!-- Arrow mark, scaled 0.46x, centered vertically in 100px canvas -->
  <!-- Original 200×200 → scaled to ~88×88, centered: translate(16, 6) -->
  <g transform="translate(16,6) scale(0.46)">
    <polygon
      points="100,22 160,98 126,98 126,178 74,178 74,98 40,98"
      fill="#C6FF34"/>
    <rect x="74" y="178" width="52" height="8" rx="4" fill="#0038A8"/>
  </g>

  <!-- Thin divider -->
  <line x1="112" y1="16" x2="112" y2="84" stroke="#FFFFFF" stroke-width="1" opacity="0.1"/>

  <!-- TU — small, lime, wide tracking -->
  <text
    x="128" y="42"
    font-family="'Outfit', 'Helvetica Neue', Arial, sans-serif"
    font-size="13" font-weight="300" letter-spacing="8"
    fill="#C6FF34" opacity="0.85">TU</text>

  <!-- PREPARADOR — dominant white -->
  <text
    x="126" y="80"
    font-family="'Outfit', 'Helvetica Neue', Arial, sans-serif"
    font-size="35" font-weight="700" letter-spacing="1"
    fill="#FFFFFF">PREPARADOR</text>
</svg>
