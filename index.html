<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0a">
<title>Fitness App — Acceso</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<link rel="stylesheet" href="css/shared.css">
<style>
  body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;padding-bottom:20px}
  .login-wrap{width:100%;max-width:380px}
  .logo{text-align:center;margin-bottom:32px}
  .logo i{font-size:48px;color:var(--blue);display:block;margin-bottom:8px}
  .logo h1{font-size:24px;font-weight:700}
  .logo p{font-size:13px;color:var(--text2);margin-top:4px}
  .login-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:24px}
  .error-msg{background:#E24B4A22;border:1px solid #E24B4A44;color:#F09595;border-radius:var(--radius-sm);padding:10px 14px;font-size:13px;margin-bottom:12px;display:none}
</style>
</head>
<body>

<div class="login-wrap">
  <div class="logo">
    <i class="ti ti-barbell"></i>
    <h1>Fitness URI</h1>
    <p>Plataforma para preparadores físicos</p>
  </div>

  <div class="login-card">
    <div class="form-group">
      <label class="form-label">Email</label>
      <input type="email" id="email" placeholder="tu@email.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label class="form-label">Contraseña</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <div class="error-msg" id="error-msg"></div>
    <button class="btn btn-primary" id="login-btn" onclick="doLogin()" style="width:100%;margin-top:4px">
      Entrar
    </button>
    <div style="text-align:center;margin-top:16px;font-size:12px;color:var(--text2)">
      ¿Eres preparador y no tienes cuenta?
      <a href="register.html" style="color:var(--blue);text-decoration:none;font-weight:600"> Regístrate gratis</a>
    </div>
  </div>
</div>

<script type="module">
import { supabase } from './js/supabase-client.js'
import { getRole, redirectByRole } from './js/auth.js'

// Si ya hay sesión activa, redirigir directamente
const { data: { session } } = await supabase.auth.getSession()
if (session) {
  const profile = await getRole(session.user.id)
  if (profile) { redirectByRole(profile.role); }
}

// Enter en los inputs hace login
document.getElementById('password').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin()
})
document.getElementById('email').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('password').focus()
})

window.doLogin = async function() {
  const email = document.getElementById('email').value.trim()
  const password = document.getElementById('password').value
  const btn = document.getElementById('login-btn')
  const errEl = document.getElementById('error-msg')

  if (!email || !password) { showError('Introduce email y contraseña.'); return }

  btn.textContent = 'Entrando...'
  btn.disabled = true
  errEl.style.display = 'none'

  const { data, error } = await supabase.auth.signInWithPassword({ email, password })

  if (error) {
    showError('Email o contraseña incorrectos.')
    btn.textContent = 'Entrar'
    btn.disabled = false
    return
  }

  const profile = await getRole(data.user.id)
  if (!profile) {
    showError('Usuario sin perfil asignado. Contacta con el administrador.')
    btn.textContent = 'Entrar'
    btn.disabled = false
    return
  }

  redirectByRole(profile.role)
}

function showError(msg) {
  const el = document.getElementById('error-msg')
  el.textContent = msg
  el.style.display = 'block'
}
</script>
</body>
</html>
