<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#03045E">
<title>Tu Preparador — Acceso</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<link rel="stylesheet" href="css/shared.css">
<style>
  body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;padding-bottom:20px}
  .login-wrap{width:100%;max-width:380px}
  .logo{text-align:center;margin-bottom:36px;animation:shimmer .6s ease-out both}
  .logo svg{display:block;margin:0 auto 14px}
  .logo h1{
    font-family:'Rajdhani',sans-serif;font-size:30px;font-weight:700;
    text-transform:uppercase;letter-spacing:.14em;color:var(--text)
  }
  .logo p{
    font-size:10px;color:var(--text2);margin-top:8px;
    letter-spacing:.22em;text-transform:uppercase
  }
  .login-card{
    background:var(--bg2);
    border:1px solid rgba(0,212,255,0.2);
    border-top:2px solid var(--blue);
    border-radius:var(--radius);padding:24px;
    box-shadow:0 8px 40px rgba(0,0,0,0.5),0 0 0 1px rgba(0,212,255,0.05)
  }
  .error-msg{background:rgba(226,75,74,0.12);border:1px solid rgba(226,75,74,0.3);color:#F09595;border-radius:var(--radius-sm);padding:10px 14px;font-size:13px;margin-bottom:12px;display:none}
</style>
</head>
<body>

<div class="login-wrap">
  <div class="logo">
    <svg width="72" height="66" viewBox="0 0 72 66" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="tpT" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#ffffff"/>
          <stop offset="100%" stop-color="#a8eeff"/>
        </linearGradient>
      </defs>
      <rect x="0" y="0" width="40" height="11" rx="2" fill="url(#tpT)"/>
      <rect x="14" y="0" width="12" height="60" rx="2" fill="url(#tpT)"/>
      <rect x="32" y="18" width="11" height="48" rx="2" fill="#00D4FF"/>
      <rect x="32" y="18" width="34" height="10" rx="2" fill="#00D4FF"/>
      <rect x="55" y="18" width="11" height="32" rx="2" fill="#00D4FF"/>
      <rect x="32" y="40" width="34" height="10" rx="2" fill="#00D4FF"/>
    </svg>
    <h1>TU PREPARADOR</h1>
    <p>CONECTA. ENTRENA. <span style="color:var(--blue)">EVOLUCIONA.</span></p>
  </div>

  <!-- Vista: Login -->
  <div class="login-card" id="view-login">
    <div class="form-group">
      <label class="form-label">Email</label>
      <input type="email" id="email" placeholder="tu@email.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label class="form-label">Contraseña</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <div class="error-msg" id="error-msg"></div>
    <button class="btn btn-primary" id="login-btn" onclick="doLogin()" style="width:100%;margin-top:4px">
      Entrar
    </button>
    <div style="text-align:center;margin-top:14px;font-size:12px">
      <a href="#" onclick="showForgot()" style="color:var(--text2);text-decoration:none">¿Olvidaste tu contraseña?</a>
    </div>
    <div style="text-align:center;margin-top:10px;font-size:12px;color:var(--text2)">
      ¿Eres preparador y no tienes cuenta?
      <a href="register.html" style="color:var(--blue);text-decoration:none;font-weight:600"> Regístrate gratis</a>
    </div>
  </div>

  <!-- Vista: Sesión activa -->
  <div class="login-card" id="view-session" style="display:none">
    <div style="text-align:center;margin-bottom:20px">
      <div style="width:48px;height:48px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:20px">
        <i class="ti ti-user" style="color:#fff"></i>
      </div>
      <div style="font-size:15px;font-weight:600" id="sess-name">—</div>
      <div style="font-size:12px;color:var(--text2);margin-top:2px" id="sess-role">—</div>
    </div>
    <button class="btn btn-primary" id="sess-go-btn" onclick="goToPortal()" style="width:100%;margin-bottom:10px">
      Ir a mi portal
    </button>
    <button class="btn" onclick="switchAccount()" style="width:100%;font-size:13px">
      <i class="ti ti-switch-horizontal"></i> Cambiar de cuenta
    </button>
  </div>

  <!-- Vista: Recuperar contraseña -->
  <div class="login-card" id="view-forgot" style="display:none">
    <div style="margin-bottom:16px">
      <div style="font-size:15px;font-weight:600;margin-bottom:6px">Recuperar contraseña</div>
      <div style="font-size:13px;color:var(--text2)">Te enviaremos un enlace para crear una nueva contraseña.</div>
    </div>
    <div class="form-group">
      <label class="form-label">Email</label>
      <input type="email" id="forgot-email" placeholder="tu@email.com" autocomplete="email">
    </div>
    <div class="error-msg" id="forgot-error"></div>
    <div id="forgot-ok" style="background:#1D9E7522;border:1px solid #1D9E7544;color:#6fcfa8;border-radius:var(--radius-sm);padding:10px 14px;font-size:13px;margin-bottom:12px;display:none">
      ✓ Revisa tu email — te hemos enviado el enlace.
    </div>
    <button class="btn btn-primary" id="forgot-btn" onclick="doForgot()" style="width:100%">
      Enviar enlace
    </button>
    <div style="text-align:center;margin-top:14px;font-size:12px">
      <a href="#" onclick="showLogin()" style="color:var(--text2);text-decoration:none">← Volver al login</a>
    </div>
  </div>
</div>

<script type="module">
import { supabase } from './js/supabase-client.js'
import { getRole, redirectByRole } from './js/auth.js'

const ROLE_LABEL = { admin: 'Administrador', trainer: 'Preparador físico', client: 'Cliente' }
let ACTIVE_PROFILE = null
let ACTIVE_SESSION = null

// Si hay sesión activa, mostrar card de bienvenida en vez de redirigir
const { data: { session } } = await supabase.auth.getSession()
if (session) {
  const profile = await getRole(session.user.id)
  if (profile) {
    ACTIVE_PROFILE = profile
    ACTIVE_SESSION = session
    document.getElementById('sess-name').textContent = profile.full_name || session.user.email
    document.getElementById('sess-role').textContent = ROLE_LABEL[profile.role] || profile.role
    document.getElementById('view-login').style.display = 'none'
    document.getElementById('view-session').style.display = 'block'
  }
}

window.goToPortal = function() {
  if (ACTIVE_PROFILE) redirectByRole(ACTIVE_PROFILE.role)
}

window.switchAccount = async function() {
  await supabase.auth.signOut()
  ACTIVE_PROFILE = null
  ACTIVE_SESSION = null
  document.getElementById('view-session').style.display = 'none'
  document.getElementById('view-login').style.display = 'block'
  document.getElementById('email').focus()
}

// Enter en los inputs hace login
document.getElementById('password').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin()
})
document.getElementById('email').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('password').focus()
})
document.getElementById('forgot-email').addEventListener('keydown', e => {
  if (e.key === 'Enter') doForgot()
})

window.showForgot = function() {
  document.getElementById('view-login').style.display = 'none'
  document.getElementById('view-forgot').style.display = 'block'
  const loginEmail = document.getElementById('email').value
  if (loginEmail) document.getElementById('forgot-email').value = loginEmail
  document.getElementById('forgot-email').focus()
}

window.showLogin = function() {
  document.getElementById('view-forgot').style.display = 'none'
  document.getElementById('view-login').style.display = 'block'
  document.getElementById('forgot-error').style.display = 'none'
  document.getElementById('forgot-ok').style.display = 'none'
}

window.doLogin = async function() {
  const email = document.getElementById('email').value.trim()
  const password = document.getElementById('password').value
  const btn = document.getElementById('login-btn')
  const errEl = document.getElementById('error-msg')

  if (!email || !password) { showError('Introduce email y contraseña.'); return }

  btn.textContent = 'Entrando...'
  btn.disabled = true
  errEl.style.display = 'none'

  const { data, error } = await supabase.auth.signInWithPassword({ email, password })

  if (error) {
    showError('Email o contraseña incorrectos.')
    btn.textContent = 'Entrar'
    btn.disabled = false
    return
  }

  const profile = await getRole(data.user.id)
  if (!profile) {
    showError('Usuario sin perfil asignado. Contacta con el administrador.')
    btn.textContent = 'Entrar'
    btn.disabled = false
    return
  }

  redirectByRole(profile.role)
}

function showError(msg) {
  const el = document.getElementById('error-msg')
  el.textContent = msg
  el.style.display = 'block'
}

window.doForgot = async function() {
  const email = document.getElementById('forgot-email').value.trim()
  const btn = document.getElementById('forgot-btn')
  const errEl = document.getElementById('forgot-error')
  const okEl = document.getElementById('forgot-ok')

  errEl.style.display = 'none'
  okEl.style.display = 'none'

  if (!email) {
    errEl.textContent = 'Introduce tu email.'
    errEl.style.display = 'block'
    return
  }

  btn.textContent = 'Enviando...'
  btn.disabled = true

  const { error } = await supabase.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.origin + '/reset-password.html'
  })

  btn.textContent = 'Enviar enlace'
  btn.disabled = false

  if (error) {
    errEl.textContent = 'Error al enviar el email. Inténtalo de nuevo.'
    errEl.style.display = 'block'
  } else {
    okEl.style.display = 'block'
    btn.style.display = 'none'
  }
}
</script>
</body>
</html>
