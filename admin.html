<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#03045E">
<title>Tu Preparador — Admin</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<link rel="stylesheet" href="css/shared.css">
<style>
  body{padding-bottom:0}
  .admin-layout{max-width:800px;margin:0 auto;padding:20px}
  .top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
</style>
</head>
<body>

<div id="loading-screen" style="display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:12px">
  <div class="spinner"></div>
</div>

<div class="admin-layout" id="app" style="display:none">
  <div class="top-bar">
    <div>
      <h1 style="font-size:20px;font-weight:700">Panel Admin</h1>
      <div style="font-size:12px;color:var(--text2)" id="admin-name">—</div>
    </div>
    <button class="btn" onclick="doLogout()" style="font-size:12px"><i class="ti ti-logout"></i> Salir</button>
  </div>

  <!-- Stats globales -->
  <div class="metric-grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:20px" id="stats-grid">
    <div class="metric"><div class="metric-label">Preparadores</div><div class="metric-val" id="stat-trainers">—</div></div>
    <div class="metric"><div class="metric-label">Clientes totales</div><div class="metric-val" id="stat-clients">—</div></div>
    <div class="metric"><div class="metric-label">Clientes activos</div><div class="metric-val" id="stat-active">—</div></div>
  </div>

  <!-- Trainers -->
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div class="card-title" style="margin:0"><i class="ti ti-users"></i> Preparadores</div>
      <button class="btn btn-primary" onclick="openNewTrainerModal()" style="font-size:12px;padding:8px 14px"><i class="ti ti-user-plus"></i> Nuevo preparador</button>
    </div>
    <div id="trainers-list"></div>
  </div>

  <!-- Todos los clientes -->
  <div class="card">
    <div class="card-title"><i class="ti ti-users"></i> Todos los clientes</div>
    <div id="all-clients-list"></div>
  </div>
</div>

<!-- MODAL NUEVO TRAINER -->
<div class="modal-overlay" id="new-trainer-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Nuevo preparador</div>
      <button class="modal-close" onclick="closeNewTrainerModal()">×</button>
    </div>
    <div class="form-group">
      <label class="form-label">Nombre completo *</label>
      <input type="text" id="nt-name" placeholder="Nombre Apellido">
    </div>
    <div class="form-group">
      <label class="form-label">Email *</label>
      <input type="email" id="nt-email" placeholder="trainer@email.com">
    </div>
    <div class="form-group">
      <label class="form-label">Contraseña temporal *</label>
      <input type="text" id="nt-password" placeholder="Min. 8 caracteres">
    </div>
    <div class="form-group">
      <label class="form-label">Especialidad</label>
      <input type="text" id="nt-specialty" placeholder="Ej: Recomposición corporal">
    </div>
    <div id="nt-error" style="color:var(--red);font-size:13px;margin-bottom:10px;display:none"></div>
    <button class="btn btn-primary" onclick="createTrainer()" style="width:100%" id="nt-btn">Crear preparador</button>
  </div>
</div>

<script type="module" src="js/admin-app.js"></script>
</body>
</html>
