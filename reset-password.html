<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0a0a0a">
<title>Fitness URI — Nueva contraseña</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<link rel="stylesheet" href="css/shared.css">
<style>
  body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
  .wrap{width:100%;max-width:380px}
  .logo{text-align:center;margin-bottom:32px}
  .logo i{font-size:48px;color:var(--blue);display:block;margin-bottom:8px}
  .logo h1{font-size:24px;font-weight:700}
  .card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:24px}
  .error-msg{background:#E24B4A22;border:1px solid #E24B4A44;color:#F09595;border-radius:var(--radius-sm);padding:10px 14px;font-size:13px;margin-bottom:12px;display:none}
</style>
</head>
<body>

<div class="wrap">
  <div class="logo">
    <i class="ti ti-barbell"></i>
    <h1>Fitness URI</h1>
  </div>

  <!-- Estado: cargando -->
  <div class="card" id="view-loading" style="text-align:center">
    <div class="spinner" style="margin:0 auto 12px"></div>
    <div style="font-size:13px;color:var(--text2)">Verificando enlace...</div>
  </div>

  <!-- Estado: formulario nueva contraseña -->
  <div class="card" id="view-form" style="display:none">
    <div style="margin-bottom:16px">
      <div style="font-size:15px;font-weight:600;margin-bottom:6px">Nueva contraseña</div>
      <div style="font-size:13px;color:var(--text2)">Elige una contraseña segura de al menos 8 caracteres.</div>
    </div>
    <div class="form-group">
      <label class="form-label">Nueva contraseña</label>
      <input type="password" id="new-pass" placeholder="Mínimo 8 caracteres" autocomplete="new-password">
    </div>
    <div class="form-group">
      <label class="form-label">Repetir contraseña</label>
      <input type="password" id="new-pass2" placeholder="Repite la contraseña" autocomplete="new-password">
    </div>
    <div class="error-msg" id="form-error"></div>
    <button class="btn btn-primary" id="save-btn" onclick="savePassword()" style="width:100%">
      Guardar contraseña
    </button>
  </div>

  <!-- Estado: éxito -->
  <div class="card" id="view-ok" style="display:none;text-align:center">
    <i class="ti ti-circle-check" style="font-size:48px;color:var(--green);display:block;margin-bottom:12px"></i>
    <div style="font-size:15px;font-weight:600;margin-bottom:8px">¡Contraseña actualizada!</div>
    <div style="font-size:13px;color:var(--text2);margin-bottom:20px">Ya puedes entrar con tu nueva contraseña.</div>
    <a href="/index.html" class="btn btn-primary" style="display:block;text-align:center">Ir al login</a>
  </div>

  <!-- Estado: enlace inválido/expirado -->
  <div class="card" id="view-invalid" style="display:none;text-align:center">
    <i class="ti ti-alert-circle" style="font-size:48px;color:var(--red);display:block;margin-bottom:12px"></i>
    <div style="font-size:15px;font-weight:600;margin-bottom:8px">Enlace inválido o expirado</div>
    <div style="font-size:13px;color:var(--text2);margin-bottom:20px">Solicita un nuevo enlace de recuperación.</div>
    <a href="/index.html" class="btn" style="display:block;text-align:center">Volver al login</a>
  </div>
</div>

<script type="module">
import { supabase } from './js/supabase-client.js'

function show(id) {
  ['view-loading','view-form','view-ok','view-invalid'].forEach(v => {
    document.getElementById(v).style.display = v === id ? 'block' : 'none'
  })
}

// Supabase redirige con el token en el hash: #access_token=...&type=recovery
// Al cargar, escuchar el evento PASSWORD_RECOVERY
const { data: { subscription } } = supabase.auth.onAuthStateChange((event, session) => {
  if (event === 'PASSWORD_RECOVERY') {
    show('view-form')
    document.getElementById('new-pass').focus()
  } else if (event === 'SIGNED_IN' && window._passwordSaved) {
    show('view-ok')
  }
})

// Si no llega evento PASSWORD_RECOVERY en 4s, el enlace no es válido
setTimeout(() => {
  const current = document.getElementById('view-loading').style.display
  if (current !== 'none') show('view-invalid')
}, 4000)

document.getElementById('new-pass2').addEventListener('keydown', e => {
  if (e.key === 'Enter') savePassword()
})

window.savePassword = async function() {
  const p1 = document.getElementById('new-pass').value
  const p2 = document.getElementById('new-pass2').value
  const errEl = document.getElementById('form-error')
  const btn = document.getElementById('save-btn')

  errEl.style.display = 'none'

  if (p1.length < 8) {
    errEl.textContent = 'La contraseña debe tener al menos 8 caracteres.'
    errEl.style.display = 'block'
    return
  }
  if (p1 !== p2) {
    errEl.textContent = 'Las contraseñas no coinciden.'
    errEl.style.display = 'block'
    return
  }

  btn.textContent = 'Guardando...'
  btn.disabled = true

  const { error } = await supabase.auth.updateUser({ password: p1 })

  if (error) {
    errEl.textContent = 'Error al guardar. Inténtalo de nuevo.'
    errEl.style.display = 'block'
    btn.textContent = 'Guardar contraseña'
    btn.disabled = false
  } else {
    window._passwordSaved = true
    show('view-ok')
    subscription.unsubscribe()
  }
}
</script>
</body>
</html>
