<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0c0c0c">
<title>Tu Preparador — Nueva contraseña</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<link rel="stylesheet" href="css/shared.css">
<style>
body{display:flex;flex-direction:column;min-height:100vh;padding:0;overflow-x:hidden;background:#0c0c0c;background-image:none}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background:repeating-linear-gradient(-52deg,transparent 0px,transparent 60px,rgba(255,255,255,0.012) 60px,rgba(255,255,255,0.012) 62px),repeating-linear-gradient(-52deg,transparent 0px,transparent 140px,rgba(255,255,255,0.007) 140px,rgba(255,255,255,0.007) 142px)}
.login-hero{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:44px 24px 32px;background:radial-gradient(ellipse 100% 60% at 50% 0%,rgba(0,210,255,0.07) 0%,transparent 70%)}
.login-hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.12) 40%,rgba(255,255,255,0.12) 60%,transparent)}
.tp-logo{display:block;margin:0 auto 18px;width:260px;height:auto;filter:drop-shadow(0 0 24px rgba(0,210,255,0.25));animation:logoIn .7s cubic-bezier(.22,1,.36,1) both}
@keyframes logoIn{from{opacity:0;transform:translateY(-12px) scale(.94)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes heroIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes cardIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.login-form-wrap{position:relative;z-index:1;width:100%;max-width:400px;margin:0 auto;padding:28px 20px 48px}
.login-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-top:1px solid rgba(255,255,255,0.18);border-radius:16px;padding:24px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);box-shadow:0 24px 64px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.08);animation:cardIn .6s .15s cubic-bezier(.22,1,.36,1) both}
.login-title{font-size:17px;font-weight:700;color:#fff;margin-bottom:8px;letter-spacing:-.01em}
.login-subtitle{font-size:13px;color:rgba(255,255,255,0.5);margin-bottom:18px;line-height:1.5}
.error-msg{background:rgba(226,75,74,0.1);border:1px solid rgba(226,75,74,0.25);color:#F09595;border-radius:var(--radius-sm);padding:10px 14px;font-size:13px;margin-bottom:12px;display:none}
.btn-login{width:100%;min-height:48px;margin-top:6px;background:white;border:none;border-radius:9999px;color:#0c0c0c;font-family:'Inter',inherit;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-login:hover{background:rgba(255,255,255,0.9);box-shadow:0 0 24px rgba(255,255,255,0.15)}
.btn-login:active{transform:scale(.98)}
.btn-login:disabled{opacity:.5;cursor:not-allowed;transform:none}
.result-box{text-align:center;padding:20px 0;display:none}
.result-box i{font-size:48px;display:block;margin-bottom:14px}
.result-box h2{font-size:18px;font-weight:700;margin-bottom:8px}
.result-box p{font-size:13px;color:rgba(255,255,255,0.5);margin-bottom:20px;line-height:1.5}
.back-link{display:block;text-align:center;margin-top:16px;font-size:12px;color:rgba(255,255,255,0.4);text-decoration:none;transition:color .2s}
.back-link:hover{color:white}
</style>
</head>
<body>

<!-- ═══ HERO ═══ -->
<div class="login-hero">
  <img class="tp-logo" src="logo.png" alt="Tu Preparador">
</div>

<!-- ═══ FORM ═══ -->
<div class="login-form-wrap">
  <div class="login-card">

    <!-- Cargando -->
    <div id="view-loading" style="text-align:center;padding:20px 0">
      <div class="spinner" style="margin:0 auto 12px"></div>
      <div style="font-size:13px;color:var(--text2)">Verificando enlace...</div>
    </div>

    <!-- Formulario nueva contraseña -->
    <div id="view-form" style="display:none">
      <div class="login-title">Nueva contraseña</div>
      <div class="login-subtitle">Elige una contraseña segura de al menos 8 caracteres.</div>
      <div class="form-group">
        <label class="form-label">Nueva contraseña</label>
        <input type="password" id="new-pass" placeholder="Mínimo 8 caracteres" autocomplete="new-password">
      </div>
      <div class="form-group">
        <label class="form-label">Repetir contraseña</label>
        <input type="password" id="new-pass2" placeholder="Repite la contraseña" autocomplete="new-password">
      </div>
      <div class="error-msg" id="form-error"></div>
      <button class="btn-login" id="save-btn" onclick="savePassword()">
        <i class="ti ti-lock-check"></i>
        <span>Guardar contraseña</span>
      </button>
    </div>

    <!-- Éxito -->
    <div class="result-box" id="view-ok">
      <i class="ti ti-circle-check" style="color:var(--green)"></i>
      <h2>¡Contraseña actualizada!</h2>
      <p>Ya puedes entrar con tu nueva contraseña.</p>
      <a href="/login.html" class="btn-login" style="text-decoration:none">
        <i class="ti ti-arrow-right"></i>
        <span>Ir al login</span>
      </a>
    </div>

    <!-- Enlace inválido -->
    <div class="result-box" id="view-invalid">
      <i class="ti ti-alert-circle" style="color:var(--red)"></i>
      <h2>Enlace inválido</h2>
      <p>Este enlace no es válido o ha caducado. Solicita uno nuevo desde el login.</p>
      <a href="/login.html" class="btn btn-primary" style="display:inline-flex;align-items:center;gap:8px;text-decoration:none;justify-content:center">
        <i class="ti ti-arrow-left"></i> Volver al login
      </a>
    </div>

  </div>
</div>

<script type="module">
import { supabase } from './js/supabase-client.js'

function show(id) {
  ['view-loading','view-form','view-ok','view-invalid'].forEach(v => {
    document.getElementById(v).style.display = v === id ? 'block' : 'none'
  })
}

const { data: { subscription } } = supabase.auth.onAuthStateChange((event, session) => {
  if (event === 'PASSWORD_RECOVERY') {
    show('view-form')
    document.getElementById('new-pass').focus()
  } else if (event === 'SIGNED_IN' && window._passwordSaved) {
    show('view-ok')
  }
})

setTimeout(() => {
  const current = document.getElementById('view-loading').style.display
  if (current !== 'none') show('view-invalid')
}, 4000)

document.getElementById('new-pass2').addEventListener('keydown', e => {
  if (e.key === 'Enter') savePassword()
})

window.savePassword = async function() {
  const p1 = document.getElementById('new-pass').value
  const p2 = document.getElementById('new-pass2').value
  const errEl = document.getElementById('form-error')
  const btn = document.getElementById('save-btn')

  errEl.style.display = 'none'

  if (p1.length < 8) {
    errEl.textContent = 'La contraseña debe tener al menos 8 caracteres.'
    errEl.style.display = 'block'
    return
  }
  if (p1 !== p2) {
    errEl.textContent = 'Las contraseñas no coinciden.'
    errEl.style.display = 'block'
    return
  }

  btn.innerHTML = '<span>Guardando...</span>'
  btn.disabled = true

  const { error } = await supabase.auth.updateUser({ password: p1 })

  if (error) {
    errEl.textContent = 'Error al guardar. Inténtalo de nuevo.'
    errEl.style.display = 'block'
    btn.innerHTML = '<i class="ti ti-lock-check"></i><span>Guardar contraseña</span>'
    btn.disabled = false
  } else {
    window._passwordSaved = true
    show('view-ok')
    subscription.unsubscribe()
  }
}
</script>
</body>
</html>
