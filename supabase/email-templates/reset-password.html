<!DOCTYPE html>
<html lang="es" xmlns="http://www.w3.org/1999/xhtml">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>Restablecer contraseña — Tu Preparador</title>
  <style>
    /* Reset */
    body, table, td, a { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
    table, td { mso-table-lspace: 0pt; mso-table-rspace: 0pt; }
    img { border: 0; outline: none; text-decoration: none; -ms-interpolation-mode: bicubic; }

    /* Mobile */
    @media only screen and (max-width: 520px) {
      .email-wrapper { width: 100% !important; }
      .card-cell { padding: 28px 20px !important; }
      .logo-img { width: 160px !important; max-width: 160px !important; }
      .heading { font-size: 20px !important; }
      .body-text { font-size: 14px !important; }
      .cta-btn { padding: 14px 28px !important; font-size: 14px !important; display: block !important; }
      .cta-td { padding-bottom: 24px !important; }
      .outer-td { padding: 28px 12px !important; }
      .icon-circle { width: 48px !important; height: 48px !important; line-height: 48px !important; font-size: 22px !important; }
    }
  </style>
</head>
<body style="margin:0;padding:0;background-color:#0A0F1E;">

<table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0"
       style="background-color:#0A0F1E;">
  <tr>
    <td class="outer-td" align="center" style="padding:40px 16px;">

      <!-- Container -->
      <table class="email-wrapper" role="presentation" cellpadding="0" cellspacing="0" border="0"
             style="width:100%;max-width:480px;">

        <!-- Logo -->
        <tr>
          <td align="center" style="padding-bottom:32px;">
            <img class="logo-img"
                 src="https://www.tupreparador.es/Logopreparador.png"
                 alt="Tu Preparador" width="200"
                 style="display:block;width:200px;max-width:200px;height:auto;">
          </td>
        </tr>

        <!-- Card -->
        <tr>
          <td style="background-color:#111827;border-radius:14px;border-top:2px solid #378ADD;">
            <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">

              <!-- Icon + Title -->
              <tr>
                <td class="card-cell" align="center" style="padding:36px 32px 12px;">
                  <table role="presentation" cellpadding="0" cellspacing="0" border="0">
                    <tr>
                      <td class="icon-circle" align="center"
                          style="width:54px;height:54px;line-height:54px;background:rgba(55,138,221,0.12);border:1px solid rgba(55,138,221,0.3);border-radius:50%;font-size:24px;text-align:center;">
                        🔑
                      </td>
                    </tr>
                  </table>
                  <h1 class="heading"
                      style="margin:20px 0 0;color:#ffffff;font-family:'Helvetica Neue',Arial,sans-serif;font-size:21px;font-weight:700;letter-spacing:-0.3px;line-height:1.3;">
                    Restablecer contraseña
                  </h1>
                </td>
              </tr>

              <!-- Body -->
              <tr>
                <td class="card-cell" style="padding:14px 32px 0;">
                  <p class="body-text"
                     style="margin:0;color:#9ca3af;font-family:'Helvetica Neue',Arial,sans-serif;font-size:15px;line-height:1.65;text-align:center;">
                    Hemos recibido una solicitud para restablecer la contraseña de tu cuenta.<br>
                    Haz clic en el botón para crear una nueva:
                  </p>
                </td>
              </tr>

              <!-- CTA -->
              <tr>
                <td class="cta-td" align="center" style="padding:28px 32px;">
                  <a class="cta-btn" href="{{ .ConfirmationURL }}"
                     style="display:inline-block;background-color:#378ADD;color:#0A0F1E;font-family:'Helvetica Neue',Arial,sans-serif;font-size:15px;font-weight:700;letter-spacing:0.6px;text-decoration:none;text-transform:uppercase;padding:15px 36px;border-radius:10px;mso-padding-alt:0;text-align:center;">
                    Restablecer mi contraseña
                  </a>
                </td>
              </tr>

              <!-- Expiry -->
              <tr>
                <td class="card-cell" style="padding:0 32px 32px;">
                  <p class="body-text"
                     style="margin:0;color:#6b7280;font-family:'Helvetica Neue',Arial,sans-serif;font-size:13px;line-height:1.6;text-align:center;">
                    Este enlace caduca en <span style="color:#9ca3af;font-weight:600;">1 hora</span>.<br>
                    Si no solicitaste este cambio, ignora este email.
                  </p>
                </td>
              </tr>

              <!-- Divider -->
              <tr>
                <td style="padding:0 32px;">
                  <div style="border-top:1px solid #1f2937;font-size:0;line-height:0;">&nbsp;</div>
                </td>
              </tr>

              <!-- Footer -->
              <tr>
                <td align="center" style="padding:18px 32px 26px;">
                  <p style="margin:0;color:#4b5563;font-family:'Helvetica Neue',Arial,sans-serif;font-size:12px;">
                    © Tu Preparador &nbsp;·&nbsp;
                    <a href="https://www.tupreparador.es" style="color:#378ADD;text-decoration:none;">www.tupreparador.es</a>
                  </p>
                </td>
              </tr>

            </table>
          </td>
        </tr>

      </table>
    </td>
  </tr>
</table>

</body>
</html>
