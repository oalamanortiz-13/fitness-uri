<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confirma tu cuenta — Tu Preparador</title>
</head>
<body style="margin:0;padding:0;background-color:#0A0F1E;font-family:'Helvetica Neue',Arial,sans-serif;">

  <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#0A0F1E;min-height:100vh;">
    <tr>
      <td align="center" style="padding:48px 16px;">

        <table width="100%" cellpadding="0" cellspacing="0" border="0" style="max-width:480px;">

          <!-- Logo -->
          <tr>
            <td align="center" style="padding-bottom:36px;">
              <img src="https://www.tupreparador.es/Logopreparador.png"
                   alt="Tu Preparador"
                   width="220"
                   style="display:block;max-width:220px;height:auto;">
            </td>
          </tr>

          <!-- Main card -->
          <tr>
            <td style="background-color:#111827;border-radius:16px;border-top:2px solid #378ADD;overflow:hidden;">
              <table width="100%" cellpadding="0" cellspacing="0" border="0">

                <!-- Icon + Title -->
                <tr>
                  <td align="center" style="padding:40px 32px 8px;">
                    <div style="display:inline-block;background:rgba(29,158,117,0.12);border:1px solid rgba(29,158,117,0.3);border-radius:50%;width:56px;height:56px;line-height:56px;text-align:center;font-size:26px;margin-bottom:20px;">✅</div>
                    <h1 style="margin:0;color:#ffffff;font-size:22px;font-weight:700;letter-spacing:-0.3px;">¡Bienvenido a Tu Preparador!</h1>
                  </td>
                </tr>

                <!-- Body text -->
                <tr>
                  <td style="padding:16px 32px 32px;">
                    <p style="margin:0 0 24px;color:#9ca3af;font-size:15px;line-height:1.6;text-align:center;">
                      Ya casi estás. Confirma tu dirección de email para activar tu cuenta de preparador:
                    </p>

                    <!-- CTA Button -->
                    <table width="100%" cellpadding="0" cellspacing="0" border="0">
                      <tr>
                        <td align="center" style="padding-bottom:28px;">
                          <a href="{{ .ConfirmationURL }}"
                             style="display:inline-block;background-color:#378ADD;color:#0A0F1E;text-decoration:none;font-size:15px;font-weight:700;letter-spacing:0.5px;padding:14px 40px;border-radius:10px;text-transform:uppercase;">
                            Confirmar mi cuenta
                          </a>
                        </td>
                      </tr>
                    </table>

                    <!-- Expiry note -->
                    <p style="margin:0;color:#6b7280;font-size:13px;text-align:center;line-height:1.5;">
                      Este enlace caduca en <strong style="color:#9ca3af;">24 horas</strong>.<br>
                      Si no creaste esta cuenta, ignora este email.
                    </p>
                  </td>
                </tr>

                <!-- Divider -->
                <tr>
                  <td style="padding:0 32px;">
                    <div style="border-top:1px solid #1f2937;"></div>
                  </td>
                </tr>

                <!-- Footer -->
                <tr>
                  <td align="center" style="padding:20px 32px 28px;">
                    <p style="margin:0;color:#4b5563;font-size:12px;">
                      © Tu Preparador · <a href="https://www.tupreparador.es" style="color:#378ADD;text-decoration:none;">www.tupreparador.es</a>
                    </p>
                  </td>
                </tr>

              </table>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>

</body>
</html>
