<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0c0c0c">
<title>Tu Preparador — Activa tu cuenta</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<link rel="stylesheet" href="css/shared.css">
<style>
body{display:flex;flex-direction:column;min-height:100vh;padding:0;overflow-x:hidden;background:#0c0c0c;background-image:none}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background:repeating-linear-gradient(-52deg,transparent 0px,transparent 60px,rgba(255,255,255,0.012) 60px,rgba(255,255,255,0.012) 62px),repeating-linear-gradient(-52deg,transparent 0px,transparent 140px,rgba(255,255,255,0.007) 140px,rgba(255,255,255,0.007) 142px)}
.login-hero{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:36px 24px 28px;background:radial-gradient(ellipse 100% 60% at 50% 0%,rgba(0,210,255,0.07) 0%,transparent 70%)}
.login-hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.12) 40%,rgba(255,255,255,0.12) 60%,transparent)}
.tp-logo{display:block;margin:0 auto 16px;width:260px;height:auto;filter:drop-shadow(0 0 24px rgba(0,210,255,0.25));animation:logoIn .7s cubic-bezier(.22,1,.36,1) both}
@keyframes logoIn{from{opacity:0;transform:translateY(-12px) scale(.94)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes heroIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes cardIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.login-form-wrap{position:relative;z-index:1;width:100%;max-width:400px;margin:0 auto;padding:24px 20px 48px}
.login-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-top:1px solid rgba(255,255,255,0.18);border-radius:16px;padding:24px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);box-shadow:0 24px 64px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.08);animation:cardIn .6s .15s cubic-bezier(.22,1,.36,1) both}
.login-title{font-size:17px;font-weight:700;color:#fff;margin-bottom:16px;letter-spacing:-.01em}
.error-msg{background:rgba(226,75,74,0.1);border:1px solid rgba(226,75,74,0.25);color:#F09595;border-radius:var(--radius-sm);padding:10px 14px;font-size:13px;margin-bottom:12px;display:none}
.invite-header{display:flex;align-items:center;gap:14px;margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid rgba(255,255,255,0.08)}
.trainer-avatar{width:52px;height:52px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,#111,var(--blue));color:#fff;font-size:18px;font-weight:700;display:flex;align-items:center;justify-content:center;box-shadow:0 0 16px rgba(0,210,255,0.2)}
.invite-header-text h2{font-size:17px;font-weight:700;letter-spacing:-.01em;margin-bottom:3px}
.invite-header-text p{font-size:12px;color:rgba(255,255,255,0.5)}
.btn-login{width:100%;min-height:48px;margin-top:6px;background:white;border:none;border-radius:9999px;color:#0c0c0c;font-family:'Inter',inherit;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-login:hover{background:rgba(255,255,255,0.9);box-shadow:0 0 24px rgba(255,255,255,0.15)}
.btn-login:active{transform:scale(.98)}
.btn-login:disabled{opacity:.5;cursor:not-allowed;transform:none}
.result-box{text-align:center;padding:20px 0;display:none}
.result-box i{font-size:48px;display:block;margin-bottom:14px}
.result-box h2{font-size:18px;font-weight:700;margin-bottom:8px}
.result-box p{font-size:13px;color:rgba(255,255,255,0.5);margin-bottom:20px;line-height:1.5}
</style>
</head>
<body>

<!-- ═══ HERO ═══ -->
<div class="login-hero">
  <img class="tp-logo" src="logo.png" alt="Tu Preparador">
</div>

<!-- ═══ FORM ═══ -->
<div class="login-form-wrap">
  <div class="login-card">

    <!-- Cargando -->
    <div id="loading-view" style="text-align:center;padding:24px 0">
      <div class="spinner" style="margin:0 auto 12px"></div>
      <div style="font-size:13px;color:var(--text2)">Verificando invitación...</div>
    </div>

    <!-- Formulario de activación -->
    <div id="form-view" style="display:none">
      <div class="login-title">Activa tu cuenta</div>

      <div class="invite-header">
        <div class="trainer-avatar" id="trainer-initials">—</div>
        <div class="invite-header-text">
          <h2 id="welcome-title">Bienvenido/a</h2>
          <p id="invite-subtitle">Tu preparador te ha invitado a la plataforma</p>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Tu email</label>
        <input type="email" id="inv-email" disabled style="opacity:.6">
      </div>
      <div class="form-group">
        <label class="form-label">Elige tu contraseña</label>
        <input type="password" id="inv-password" placeholder="Mínimo 8 caracteres" autocomplete="new-password">
      </div>
      <div class="form-group">
        <label class="form-label">Confirmar contraseña</label>
        <input type="password" id="inv-password2" placeholder="Repite la contraseña" autocomplete="new-password">
      </div>

      <div class="error-msg" id="error-msg"></div>

      <button class="btn-login" id="activate-btn" onclick="doActivate()">
        <i class="ti ti-rocket"></i>
        <span>Activar mi cuenta</span>
      </button>
    </div>

    <!-- Éxito -->
    <div class="result-box" id="success-view">
      <i class="ti ti-circle-check" style="color:var(--green)"></i>
      <h2>¡Cuenta activada!</h2>
      <p>Accediendo a tu portal...</p>
    </div>

    <!-- Inválida -->
    <div class="result-box" id="invalid-view">
      <i class="ti ti-link-off" style="color:var(--red)"></i>
      <h2 id="invalid-title">Link inválido</h2>
      <p id="invalid-msg">Este link de invitación no existe o ya ha sido utilizado.</p>
      <a href="login.html" class="btn-login" style="text-decoration:none">
        <i class="ti ti-home"></i>
        <span>Ir al inicio</span>
      </a>
    </div>

  </div>
</div>

<script type="module">
import { supabase } from './js/supabase-client.js'

const token = new URLSearchParams(window.location.search).get('token')
let INVITATION = null

try {
  if (!token) {
    showInvalid('Link inválido', 'No se encontró el código de invitación en la URL.')
  } else {
    await loadInvitation(token)
  }
} catch (e) {
  showInvalid('Error inesperado', e.message || 'Recarga la página e inténtalo de nuevo.')
}

document.getElementById('inv-password2')?.addEventListener('keydown', e => {
  if (e.key === 'Enter') doActivate()
})

async function loadInvitation(token) {
  const { data, error } = await supabase
    .from('invitations')
    .select('id, client_name, client_email, trainer_id, trainer_name, expires_at, used_at')
    .eq('token', token)
    .single()

  document.getElementById('loading-view').style.display = 'none'

  if (error || !data) {
    const msg = error?.code === 'PGRST301' || error?.code === '42P01'
      ? 'La base de datos no está configurada correctamente. Contacta con el administrador.'
      : 'Esta invitación no existe o ha expirado. Pide a tu preparador un nuevo link.'
    showInvalid('Link inválido', msg)
    return
  }

  if (data.used_at) {
    showInvalid('Ya activada', 'Esta invitación ya fue utilizada. Si es tu cuenta, inicia sesión directamente.')
    return
  }

  if (new Date(data.expires_at) < new Date()) {
    showInvalid('Link expirado', 'Esta invitación ha caducado (7 días). Pide a tu preparador que te envíe un nuevo link.')
    return
  }

  INVITATION = data
  const trainerName = data.trainer_name || 'Tu preparador'
  const initials = trainerName.split(' ').slice(0, 2).map(w => w[0]).join('').toUpperCase()

  document.getElementById('trainer-initials').textContent = initials
  document.getElementById('welcome-title').textContent = `Hola, ${data.client_name.split(' ')[0]}`
  document.getElementById('invite-subtitle').textContent = `${trainerName} te ha invitado a la plataforma`
  document.getElementById('inv-email').value = data.client_email

  document.getElementById('form-view').style.display = 'block'
}

window.doActivate = async function() {
  const password  = document.getElementById('inv-password').value
  const password2 = document.getElementById('inv-password2').value
  const btn = document.getElementById('activate-btn')
  const errEl = document.getElementById('error-msg')

  errEl.style.display = 'none'

  if (!password) { showError('Elige una contraseña.'); return }
  if (password.length < 8) { showError('La contraseña debe tener al menos 8 caracteres.'); return }
  if (password !== password2) { showError('Las contraseñas no coinciden.'); return }

  btn.innerHTML = '<span>Activando...</span>'
  btn.disabled = true

  const { data, error } = await supabase.auth.signUp({
    email: INVITATION.client_email,
    password,
    options: { data: { role: 'client', full_name: INVITATION.client_name } }
  })

  if (error) {
    showError(error.message === 'User already registered'
      ? 'Este email ya tiene una cuenta. Inicia sesión desde la pantalla principal.'
      : error.message)
    btn.innerHTML = '<i class="ti ti-rocket"></i><span>Activar mi cuenta</span>'
    btn.disabled = false
    return
  }

  if (data.user) {
    await supabase.from('profiles').upsert({
      id: data.user.id,
      role: 'client',
      full_name: INVITATION.client_name,
      email: INVITATION.client_email,
    })

    await supabase.from('clients').upsert({
      id: data.user.id,
      trainer_id: INVITATION.trainer_id,
      plan_start_date: new Date().toISOString().split('T')[0],
    })

    await supabase.from('invitations')
      .update({ used_at: new Date().toISOString() })
      .eq('token', token)
  }

  document.getElementById('form-view').style.display = 'none'
  document.getElementById('success-view').style.display = 'block'

  setTimeout(() => window.location.href = 'client.html', 1800)
}

function showInvalid(title, msg) {
  document.getElementById('loading-view').style.display = 'none'
  document.getElementById('invalid-title').textContent = title
  document.getElementById('invalid-msg').textContent = msg
  document.getElementById('invalid-view').style.display = 'block'
}

function showError(msg) {
  const el = document.getElementById('error-msg')
  el.textContent = msg
  el.style.display = 'block'
}
</script>
</body>
</html>
