<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0a0a0a">
<title>Fitness App — Preparador</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<link rel="stylesheet" href="css/shared.css">
<style>
  body{padding-bottom:0}
  .layout{display:flex;max-width:900px;margin:0 auto;min-height:100vh}
  .sidebar{width:260px;flex-shrink:0;border-right:1px solid var(--border);padding:16px;position:sticky;top:0;height:100vh;overflow-y:auto;background:var(--bg2)}
  .main{flex:1;padding:20px;overflow-y:auto}
  @media(max-width:600px){
    .layout{flex-direction:column}
    .sidebar{width:100%;height:auto;position:relative;border-right:none;border-bottom:1px solid var(--border)}
  }
  .sidebar-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
  .sidebar-title{font-size:14px;font-weight:600}
  .search-input{padding:8px 12px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--bg3);color:var(--text);font-size:13px;font-family:inherit;width:100%;margin-bottom:10px}
</style>
</head>
<body>

<div id="loading-screen" style="display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:12px">
  <div class="spinner"></div>
  <div style="color:var(--text2);font-size:14px">Cargando...</div>
</div>

<div class="layout" id="app" style="display:none">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div>
        <div class="sidebar-title">Mis clientes</div>
        <div style="font-size:11px;color:var(--text2)" id="trainer-name">—</div>
      </div>
      <button class="btn" onclick="doLogout()" style="font-size:11px;padding:6px 10px"><i class="ti ti-logout"></i></button>
    </div>
    <input type="text" class="search-input" placeholder="Buscar cliente..." oninput="filterClients(this.value)">
    <button class="btn btn-primary" onclick="openNewClientModal()" style="width:100%;margin-bottom:12px;font-size:13px">
      <i class="ti ti-user-plus"></i> Nuevo cliente
    </button>
    <div id="client-list"></div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div id="main-content">
      <div class="empty-state">
        <i class="ti ti-users"></i>
        <div style="font-size:16px;font-weight:600;margin-bottom:8px">Selecciona un cliente</div>
        <div style="font-size:13px">Elige un cliente de la lista o crea uno nuevo</div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL NUEVO CLIENTE -->
<div class="modal-overlay" id="new-client-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Nuevo cliente</div>
      <button class="modal-close" onclick="closeNewClientModal()">×</button>
    </div>
    <div class="form-group">
      <label class="form-label">Nombre completo *</label>
      <input type="text" id="nc-name" placeholder="Nombre Apellido">
    </div>
    <div class="form-group">
      <label class="form-label">Email *</label>
      <input type="email" id="nc-email" placeholder="cliente@email.com">
    </div>
    <div class="form-group">
      <label class="form-label">Contraseña temporal *</label>
      <input type="text" id="nc-password" placeholder="Min. 8 caracteres">
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div class="form-group">
        <label class="form-label">Edad</label>
        <input type="number" id="nc-age" placeholder="40" min="15" max="90">
      </div>
      <div class="form-group">
        <label class="form-label">Altura (cm)</label>
        <input type="number" id="nc-height" placeholder="175" min="140" max="220">
      </div>
      <div class="form-group">
        <label class="form-label">Peso actual (kg)</label>
        <input type="number" id="nc-weight" placeholder="80" step="0.1">
      </div>
      <div class="form-group">
        <label class="form-label">Peso objetivo</label>
        <input type="text" id="nc-weight-goal" placeholder="72-75 kg">
      </div>
      <div class="form-group">
        <label class="form-label">Kcal objetivo/día</label>
        <input type="number" id="nc-kcal" placeholder="2500">
      </div>
      <div class="form-group">
        <label class="form-label">Proteína objetivo (g)</label>
        <input type="number" id="nc-protein" placeholder="175">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Notas médicas / lesiones</label>
      <textarea id="nc-notes" placeholder="Ej: 2 hernias lumbares, evitar carga axial..."></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">Duración del plan (semanas)</label>
      <input type="number" id="nc-weeks" placeholder="12" min="4" max="52" value="12">
    </div>
    <div id="nc-error" style="color:var(--red);font-size:13px;margin-bottom:10px;display:none"></div>
    <button class="btn btn-primary" onclick="createClient()" style="width:100%" id="nc-btn">Crear cliente</button>
  </div>
</div>

<!-- MODAL NUEVO EJERCICIO -->
<div class="modal-overlay" id="ex-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="ex-modal-title">Añadir ejercicio</div>
      <button class="modal-close" onclick="closeExModal()">×</button>
    </div>
    <div class="form-group">
      <label class="form-label">Nombre del ejercicio *</label>
      <input type="text" id="ex-name" placeholder="Ej: Press inclinado mancuernas">
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div class="form-group">
        <label class="form-label">Series x Reps *</label>
        <input type="text" id="ex-sets" placeholder="Ej: 4x8, 3x40s">
      </div>
      <div class="form-group">
        <label class="form-label">Nota</label>
        <input type="text" id="ex-note" placeholder="Ej: Lumbar protegida">
      </div>
    </div>
    <button class="btn btn-primary" onclick="saveExercise()" style="width:100%">Guardar</button>
  </div>
</div>

<!-- MODAL NUEVO ALIMENTO -->
<div class="modal-overlay" id="food-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Añadir alimento</div>
      <button class="modal-close" onclick="closeFoodModal()">×</button>
    </div>
    <div class="form-group">
      <label class="form-label">Nombre del alimento *</label>
      <input type="text" id="fd-name" placeholder="Ej: Pollo 150g + arroz">
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div class="form-group">
        <label class="form-label">Proteína (g)</label>
        <input type="number" id="fd-prot" placeholder="0" min="0">
      </div>
      <div class="form-group">
        <label class="form-label">Calorías</label>
        <input type="number" id="fd-kcal" placeholder="0" min="0">
      </div>
    </div>
    <button class="btn btn-primary" onclick="saveFood()" style="width:100%">Guardar</button>
  </div>
</div>

<script type="module" src="js/trainer-app.js"></script>
</body>
</html>
